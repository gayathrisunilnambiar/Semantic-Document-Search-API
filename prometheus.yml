# ─────────────────────────────────────────────────────────────────────
# prometheus.yml — Scrape configuration for Semantic Search API
# ─────────────────────────────────────────────────────────────────────

global:
  # How often Prometheus evaluates rules (alerting / recording).
  evaluation_interval: 15s

scrape_configs:

  # ── Scrape the FastAPI search API ──────────────────────────────
  # Prometheus will HTTP GET http://api:8000/metrics every 15s and
  # parse the text-exposition-format response into time-series.
  #
  # "api" resolves via Docker Compose's internal DNS because both
  # services are on the same "search-net" bridge network.
  - job_name: "search-api"
    scrape_interval: 15s             # Override global default for this job
    metrics_path: "/metrics"         # Path exposed by prometheus_client make_asgi_app()
    static_configs:
      - targets: ["api:8000"]        # <service-name>:<container-port>
        labels:
          environment: "development" # Extra label attached to every scraped metric
